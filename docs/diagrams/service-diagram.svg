<svg viewBox="0 0 1000 360" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <rect width="1000" height="360" fill="#ffffff"/>

  <!-- LibraryAppMicroservice -->
  <rect x="40" y="120" width="240" height="120" rx="8" fill="#e8f0fe" stroke="#1a73e8" stroke-width="2"/>
  <text x="160" y="150" text-anchor="middle" font-size="16" font-weight="bold">LibraryAppMicroservice</text>
  <text x="160" y="172" text-anchor="middle" font-size="12" fill="#444">port 8080</text>
  <text x="160" y="196" text-anchor="middle" font-size="12" fill="#444">GET /print, /find</text>
  <text x="160" y="214" text-anchor="middle" font-size="12" fill="#444">CacheClient (REST)</text>

  <!-- CacheMicroservice -->
  <rect x="380" y="120" width="240" height="120" rx="8" fill="#fef7e0" stroke="#f9a825" stroke-width="2"/>
  <text x="500" y="150" text-anchor="middle" font-size="16" font-weight="bold">CacheMicroservice</text>
  <text x="500" y="172" text-anchor="middle" font-size="12" fill="#444">port 8081 · SQLite</text>
  <text x="500" y="196" text-anchor="middle" font-size="12" fill="#444">GET/POST /cache</text>
  <text x="500" y="214" text-anchor="middle" font-size="12" fill="#444">TTL 1h, MerkleClient (REST)</text>

  <!-- MerkleMicroservice -->
  <rect x="720" y="120" width="240" height="120" rx="8" fill="#e6f4ea" stroke="#188038" stroke-width="2"/>
  <text x="840" y="150" text-anchor="middle" font-size="16" font-weight="bold">MerkleMicroservice</text>
  <text x="840" y="172" text-anchor="middle" font-size="12" fill="#444">port 8082 · in-memory</text>
  <text x="840" y="196" text-anchor="middle" font-size="12" fill="#444">POST /tree/build, /tree/leaf</text>
  <text x="840" y="214" text-anchor="middle" font-size="12" fill="#444">GET /tree/search, /tree/root</text>

  <!-- arrows -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#333"/>
    </marker>
  </defs>

  <line x1="280" y1="160" x2="378" y2="160" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="329" y="148" text-anchor="middle" font-size="11" fill="#333">REST: GET/POST /cache</text>

  <line x1="620" y1="160" x2="718" y2="160" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="669" y="148" text-anchor="middle" font-size="11" fill="#333">REST: /tree/search, /tree/leaf</text>

  <!-- chain label -->
  <text x="500" y="60" text-anchor="middle" font-size="18" font-weight="bold">Diagrama de servicii (orchestrare tip chain)</text>
  <text x="500" y="84" text-anchor="middle" font-size="12" fill="#555">LibraryApp verifica cache-ul inainte de cautare; Cache foloseste Merkle pentru lookup rapid de chei</text>

  <!-- data stores -->
  <ellipse cx="500" cy="300" rx="70" ry="22" fill="#fff3cd" stroke="#f9a825"/>
  <text x="500" y="305" text-anchor="middle" font-size="12">cache.db (SQLite)</text>
  <line x1="500" y1="240" x2="500" y2="278" stroke="#999" stroke-width="1.5" stroke-dasharray="4,3"/>

  <ellipse cx="840" cy="300" rx="90" ry="22" fill="#d8f0e0" stroke="#188038"/>
  <text x="840" y="305" text-anchor="middle" font-size="12">arbore Merkle (in-memory)</text>
  <line x1="840" y1="240" x2="840" y2="278" stroke="#999" stroke-width="1.5" stroke-dasharray="4,3"/>
</svg>
