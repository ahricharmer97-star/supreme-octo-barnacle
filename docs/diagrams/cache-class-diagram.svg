<svg viewBox="0 0 1100 720" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif" font-size="12">
  <rect width="1100" height="720" fill="#ffffff"/>
  <text x="550" y="30" text-anchor="middle" font-size="18" font-weight="bold">Diagrama de clase - CacheMicroservice</text>

  <!-- CacheController -->
  <g>
    <rect x="420" y="60" width="260" height="90" fill="#e8f0fe" stroke="#1a73e8" stroke-width="1.5"/>
    <text x="550" y="78" text-anchor="middle" font-weight="bold">CacheController</text>
    <line x1="420" y1="86" x2="680" y2="86" stroke="#1a73e8"/>
    <text x="430" y="104">+ lookup(query): String?</text>
    <text x="430" y="122">+ store(query, result): void</text>
    <text x="430" y="140">+ init(): void</text>
  </g>

  <!-- ICacheService -->
  <g>
    <rect x="420" y="190" width="260" height="70" fill="#fff" stroke="#666" stroke-width="1.2"/>
    <text x="550" y="208" text-anchor="middle" font-style="italic" font-weight="bold">&lt;&lt;interface&gt;&gt; ICacheService</text>
    <line x1="420" y1="216" x2="680" y2="216" stroke="#666"/>
    <text x="430" y="234">+ lookup(query): String?</text>
    <text x="430" y="250">+ store(query, result): void</text>
  </g>

  <!-- CacheService -->
  <g>
    <rect x="420" y="300" width="260" height="110" fill="#fef7e0" stroke="#f9a825" stroke-width="1.5"/>
    <text x="550" y="318" text-anchor="middle" font-weight="bold">CacheService</text>
    <line x1="420" y1="326" x2="680" y2="326" stroke="#f9a825"/>
    <text x="430" y="342">- ttlSeconds: Long</text>
    <line x1="420" y1="350" x2="680" y2="350" stroke="#f9a825"/>
    <text x="430" y="366">+ lookup(query): String?</text>
    <text x="430" y="382">+ store(query, result): void</text>
    <text x="430" y="398">(uses ICacheRepository, IMerkleClient)</text>
  </g>

  <!-- ICacheRepository -->
  <g>
    <rect x="80" y="300" width="260" height="120" fill="#fff" stroke="#666" stroke-width="1.2"/>
    <text x="210" y="318" text-anchor="middle" font-style="italic" font-weight="bold">&lt;&lt;interface&gt;&gt; ICacheRepository</text>
    <line x1="80" y1="326" x2="340" y2="326" stroke="#666"/>
    <text x="90" y="342">+ createTable()</text>
    <text x="90" y="358">+ add(entry)</text>
    <text x="90" y="374">+ getByQuery(query)</text>
    <text x="90" y="390">+ update(entry)</text>
    <text x="90" y="406">+ delete(query)</text>
  </g>

  <!-- CacheRepository -->
  <g>
    <rect x="80" y="460" width="260" height="80" fill="#fef7e0" stroke="#f9a825" stroke-width="1.5"/>
    <text x="210" y="478" text-anchor="middle" font-weight="bold">CacheRepository</text>
    <line x1="80" y1="486" x2="340" y2="486" stroke="#f9a825"/>
    <text x="90" y="502">- jdbcTemplate: JdbcTemplate</text>
    <text x="90" y="518">- rowMapper: CacheEntryRowMapper</text>
    <text x="90" y="532">(JDBC + SQLite, table cache_entries)</text>
  </g>

  <!-- CacheEntry -->
  <g>
    <rect x="80" y="580" width="260" height="110" fill="#f1f3f4" stroke="#5f6368" stroke-width="1.2"/>
    <text x="210" y="598" text-anchor="middle" font-weight="bold">CacheEntry</text>
    <line x1="80" y1="606" x2="340" y2="606" stroke="#5f6368"/>
    <text x="90" y="622">- entryId: Int</text>
    <text x="90" y="636">- entryQuery: String</text>
    <text x="90" y="650">- entryResult: String</text>
    <text x="90" y="664">- entryTimestamp: Long</text>
    <line x1="80" y1="670" x2="340" y2="670" stroke="#5f6368"/>
    <text x="90" y="684">+ isFresh(ttlSeconds): Boolean</text>
  </g>

  <!-- IMerkleClient -->
  <g>
    <rect x="760" y="300" width="260" height="100" fill="#fff" stroke="#666" stroke-width="1.2"/>
    <text x="890" y="318" text-anchor="middle" font-style="italic" font-weight="bold">&lt;&lt;interface&gt;&gt; IMerkleClient</text>
    <line x1="760" y1="326" x2="1020" y2="326" stroke="#666"/>
    <text x="770" y="342">+ indexQuery(query)</text>
    <text x="770" y="358">+ removeQuery(query)</text>
    <text x="770" y="374">+ containsQuery(query): Boolean</text>
  </g>

  <!-- MerkleClient -->
  <g>
    <rect x="760" y="460" width="260" height="100" fill="#e6f4ea" stroke="#188038" stroke-width="1.5"/>
    <text x="890" y="478" text-anchor="middle" font-weight="bold">MerkleClient</text>
    <line x1="760" y1="486" x2="1020" y2="486" stroke="#188038"/>
    <text x="770" y="502">- baseUrl: String</text>
    <text x="770" y="518">- restTemplate: RestTemplate</text>
    <text x="770" y="534">(calls MerkleMicroservice REST API)</text>
  </g>

  <!-- relationships -->
  <line x1="550" y1="150" x2="550" y2="190" stroke="#333" stroke-width="1.5" marker-end="url(#a1)"/>
  <line x1="550" y1="260" x2="550" y2="300" stroke="#333" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="420" y1="350" x2="340" y2="340" stroke="#333" stroke-width="1.5"/>
  <line x1="340" y1="380" x2="220" y2="460" stroke="#333" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="210" y1="420" x2="210" y2="460" stroke="#333" stroke-width="1.5"/>
  <line x1="210" y1="540" x2="210" y2="580" stroke="#333" stroke-width="1.5"/>
  <line x1="680" y1="350" x2="760" y2="340" stroke="#333" stroke-width="1.5"/>
  <line x1="890" y1="400" x2="890" y2="460" stroke="#333" stroke-width="1.5" stroke-dasharray="5,3"/>

  <defs>
    <marker id="a1" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#333"/>
    </marker>
  </defs>

  <text x="900" y="660" font-size="11" fill="#555">linie continua = compunere/folosire directa</text>
  <text x="900" y="676" font-size="11" fill="#555">linie punctata = implementeaza interfata</text>
</svg>
